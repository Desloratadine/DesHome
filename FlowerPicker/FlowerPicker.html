<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌿 层渊花园 - 花朵采集与路径探索</title>
    <link rel="stylesheet" href="style.css">
    <script src="config.js"></script>
</head>
<body>

    <div class="game-wrapper" id="gameWrapper">
        <!-- 头部面板 -->
        <div class="header-panel">
            <div class="title-area">
                <span class="title-icon">🌿</span>
                <span class="title-text">层渊花园</span>
            </div>
            <div class="progress-area">
                <span>第<span id="currentLayer">1</span>/<span id="totalLayers">4</span>层</span>
                <span class="progress-number" id="progressNumber">当前: 1/6 | 碎片: 0/3</span>
                <div class="progress-dots" id="progressDots"></div>
            </div>
        </div>

        <!-- Canvas游戏区域 -->
        <canvas id="gameCanvas"></canvas>

        <!-- 背包与武器 -->
        <div class="backpack-panel">
            <span class="backpack-label">🎒 背包</span>
            <div class="backpack-slots" id="backpackSlots"></div>
            <span class="backpack-count" id="backpackCount">0/6</span>
        </div>
        <div class="weapon-panel" id="weaponPanel" style="display:none;">
            <span class="weapon-label">🗡️ 武器 Lv.<span id="weaponLevel">0</span></span>
            <button class="btn btn-weapon-upgrade" id="btnWeaponUpgrade">⬆ 升级</button>
        </div>

        <!-- 指引者日志 -->
        <div class="guide-log-panel">
            <div class="guide-log-header">
                <span class="guide-log-icon">📜</span>
                <span class="guide-log-title">指引者提示</span>
            </div>
            <div class="guide-log-content" id="guideLogContent">
                <div class="guide-log-empty">点亮指引者地块并支付花朵获取提示</div>
            </div>
        </div>

        <!-- 提示 -->
        <div class="hint-text" id="hintText">点击已点亮的地块采集花朵 🌸</div>
    </div>

    <!-- 怪物弹窗（隐藏） -->
    <div class="overlay" id="monsterOverlay" style="display:none;">
        <div class="popup monster-popup">
            <span class="popup-emoji">👾</span>
            <h2 id="monsterTitle">守关怪物出现了！</h2>
            <p id="monsterDesc">贪婪的怪物索要你的花朵作为通行代价！<br>你可以选择支付或拒绝，但拒绝会带来后果...</p>
            <p id="monsterStolenInfo" style="color:#e05555;font-weight:700;min-height:60px;"></p>
            <div class="monster-buttons" id="monsterButtons">
                <button class="btn btn-monster-pay" id="btnMonsterPay">支付代价</button>
                <button class="btn btn-monster-refuse" id="btnMonsterRefuse">拒绝支付</button>
                <button class="btn btn-monster-attack" id="btnMonsterAttack" style="display:none;">⚔️ 攻击怪物</button>
            </div>
        </div>
    </div>

    <!-- 胜利弹窗（隐藏） -->
    <div class="overlay" id="winOverlay" style="display:none;">
        <div class="popup win-popup">
            <span class="popup-emoji" id="winEmoji">🎉</span>
            <h2 id="winTitle">宝藏找到了！</h2>
            <p id="winMessage">你发现了隐藏在地下的神秘宝藏！<br>穿越有限的地块，在怪物威胁下找到了财富 💎✨</p>
            <p id="winSubtitle" style="color:#5cb878;">真正的冒险者懂得在限制中寻找机会！</p>
            <button class="btn btn-win" id="btnWinOk">🌿 再来一局</button>
        </div>
    </div>

    <script>
        (function() {
            // ==================== DOM元素 ====================
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const canvasContainer = canvas.parentElement; // 使用canvas的父元素（.game-wrapper）
            const gameWrapper = document.getElementById('gameWrapper');
            const progressNumber = document.getElementById('progressNumber');
            const progressDots = document.getElementById('progressDots');
            const backpackSlots = document.getElementById('backpackSlots');
            const backpackCount = document.getElementById('backpackCount');
            const hintText = document.getElementById('hintText');
            const monsterOverlay = document.getElementById('monsterOverlay');
            const winOverlay = document.getElementById('winOverlay');
            const btnMonsterPay = document.getElementById('btnMonsterPay');
            const btnMonsterRefuse = document.getElementById('btnMonsterRefuse');
            const btnMonsterAttack = document.getElementById('btnMonsterAttack');
            const btnWinOk = document.getElementById('btnWinOk');
            const monsterStolenInfo = document.getElementById('monsterStolenInfo');
            const monsterButtons = document.getElementById('monsterButtons');
            // 武器UI
            const weaponPanel = document.getElementById('weaponPanel');
            const weaponLevelText = document.getElementById('weaponLevel');
            const btnWeaponUpgrade = document.getElementById('btnWeaponUpgrade');
            // 指引者日志DOM
            const guideLogContent = document.getElementById('guideLogContent');

            // ==================== 游戏常量 ====================
            // 配置对象（默认值，将从config.js加载或使用默认值）
            let CONFIG = {
                gridSize: 5,
                totalLayers: 4,
                backpackCapacity: 6,
                flowersToLightBase: 3,
                maxLitTiles: 6,
                monsterInterval: 2,
                initialFlowers: 6,
                newTurfFlowersMinBase: 3,
                newTurfFlowersMaxBase: 6,
                cellBaseSize: 80,
                cellGap: 5,
                canvasPadding: 30,
                monsterDemandPercent: 0.5,
                layerFlowerRanges: [
                    {min: 3, max: 6},
                    {min: 4, max: 7},
                    {min: 5, max: 8},
                    {min: 6, max: 9}
                ],
                // 武器系统配置
                weaponUpgradeCosts: [0, 5, 8, 12], // Lv0→1, Lv1→2, Lv2→3, Lv3→4
                weaponDemandPercents: [0.5, 0.4, 0.3, 0.2, 0] // 索引=武器等级，守关索要比例
            };

            // ==================== 配置加载 ====================
            // 合并外部配置（如果存在）
            if (typeof window.GAME_CONFIG !== 'undefined') {
                Object.assign(CONFIG, window.GAME_CONFIG);
                console.log('📋 游戏配置已从 config.js 加载');
            } else {
                console.log('⚠️  未找到外部配置，使用默认配置');
            }

            // ==================== 配置常量 ====================
            const GRID_SIZE = CONFIG.gridSize;
            const TOTAL_LAYERS = CONFIG.totalLayers;
            const BACKPACK_CAPACITY = CONFIG.backpackCapacity;
            const FLOWERS_TO_LIGHT_BASE = CONFIG.flowersToLightBase;
            const MAX_LIT_TILES = CONFIG.maxLitTiles;
            const MONSTER_INTERVAL = CONFIG.monsterInterval;
            const INITIAL_FLOWERS = CONFIG.initialFlowers;
            const CELL_BASE_SIZE = CONFIG.cellBaseSize;
            const CELL_GAP = CONFIG.cellGap;
            const CANVAS_PADDING = CONFIG.canvasPadding;
            const MONSTER_DEMAND_PERCENT = CONFIG.monsterDemandPercent;
            // 武器系统配置
            const WEAPON_UPGRADE_COSTS = CONFIG.weaponUpgradeCosts; // Lv0→1, Lv1→2, Lv2→3, Lv3→4
            const WEAPON_DEMAND_PERCENTS = CONFIG.weaponDemandPercents; // 索引=武器等级，守关索要比例

            // ==================== 游戏状态 ====================
            let grid = []; // grid[row][col] = { lit, flowers: [{x,y,color}], litIndex: -1, isStair: false }
            let backpack = []; // 背包中的花朵（存储颜色信息）
            let currentLayer = 1; // 当前层数（1-4）
            let litCount = 0; // 当前层已点亮地块总数（包括初始）
            let expandedCount = 0; // 当前层扩展次数（用于游击怪物触发）
            let litTilesHistory = []; // 按点亮顺序存储的地块坐标 [{row, col}]
            let stairLocation = null; // 当前层阶梯位置 {row, col}
            let treasureLocation = null; // 第四层宝藏位置 {row, col}
            let monsterActive = false;
            let monsterDemandLevel = 1; // 怪物索要等级（随遭遇次数增加）
            let treasureFound = false; // 是否找到宝藏（第四层）
            let treasureFragments = 0; // 已获得的宝藏碎片数（0-3）
            let particles = []; // 粒子效果
            let hoveredCell = null; // 当前悬停的单元格
            let cellPixelSize = CELL_BASE_SIZE; // 实际单元格像素大小（可能缩放）
            let canvasCSSWidth = 0; // Canvas的CSS宽度（用于正确计算网格偏移）
            let canvasCSSHeight = 0; // Canvas的CSS高度
            let inGuerrillaMode = false; // 是否处于游击模式
            // 指引者系统（v2.0）
            let guideLocations = []; // 三个指引者地块的位置 [{row, col, type, revealed}]
            let guideLog = []; // 指引者提示日志
            // type: 'stair' | 'weapon' | 'reveal'（第4层全为'treasure'）
            let guerrillaTriggerCount = 0; // 游击模式触发计数器
            // 花朵再生机制
            let regrowCooldown = 0; // 再生冷却帧计数（约60fps）
            // 武器系统
            let weaponLevel = 0; // 0=无武器, 1-4=武器等级
            let weaponLocation = null; // 当前层武器箱位置 {row, col}
            let guerrillaDemandPercent = 0.5; // 游击怪物索要比例（默认50%，攻击后降至30%）

            // ==================== 初始化 ====================
            function initGrid() {
                grid = [];
                for (let row = 0; row < GRID_SIZE; row++) {
                    grid[row] = [];
                    for (let col = 0; col < GRID_SIZE; col++) {
                        grid[row][col] = {
                            lit: false,
                            flowers: [],
                            litIndex: -1, // -1表示未点亮，>=0表示点亮顺序
                            isStair: false,
                            withered: false, // 枯萎地块
                            isGuide: false,
                            guideIndex: -1,
                            isWeapon: false,
                        };
                    }
                }
                // 初始地块在中心
                const centerRow = Math.floor(GRID_SIZE / 2);
                const centerCol = Math.floor(GRID_SIZE / 2);
                grid[centerRow][centerCol].lit = true;
                grid[centerRow][centerCol].litIndex = 0; // 第一个点亮的地块
                litCount = 1;
                expandedCount = 0;
                litTilesHistory = [{row: centerRow, col: centerCol}];
                generateFlowersForCell(centerRow, centerCol, INITIAL_FLOWERS);
                
                // 随机放置阶梯地块（避免在起点和紧邻起点）
                let stairRow, stairCol;
                do {
                    stairRow = Math.floor(Math.random() * GRID_SIZE);
                    stairCol = Math.floor(Math.random() * GRID_SIZE);
                } while (
                    (stairRow === centerRow && stairCol === centerCol) ||
                    (Math.abs(stairRow - centerRow) <= 1 && Math.abs(stairCol - centerCol) <= 1)
                );
                
                stairLocation = {row: stairRow, col: stairCol};
                grid[stairRow][stairCol].isStair = true;
                console.log(`第${currentLayer}层阶梯隐藏在位置 (${stairRow}, ${stairCol})`);
                
                // 如果是第四层，放置宝藏
                if (currentLayer === TOTAL_LAYERS) {
                    let treasureRow, treasureCol;
                    do {
                        treasureRow = Math.floor(Math.random() * GRID_SIZE);
                        treasureCol = Math.floor(Math.random() * GRID_SIZE);
                    } while (
                        (treasureRow === centerRow && treasureCol === centerCol) ||
                        (treasureRow === stairRow && treasureCol === stairCol)
                    );
                    treasureLocation = {row: treasureRow, col: treasureCol};
                    treasureFound = false;
                    console.log(`第四层宝藏隐藏在位置 (${treasureRow}, ${treasureCol})`);
                } else {
                    treasureLocation = null;
                }
                
                // 重置其他状态
                monsterDemandLevel = 1;
                inGuerrillaMode = false;
                guerrillaTriggerCount = 0;
                guerrillaDemandPercent = 0.5;
                
                // 第1-3层放置武器箱，第4层不放（可从之前层携带）
                weaponLocation = null;
                if (currentLayer < TOTAL_LAYERS) {
                    let weaponRow, weaponCol;
                    do {
                        weaponRow = Math.floor(Math.random() * GRID_SIZE);
                        weaponCol = Math.floor(Math.random() * GRID_SIZE);
                    } while (
                        (weaponRow === centerRow && weaponCol === centerCol) ||
                        (Math.abs(weaponRow - centerRow) <= 1 && Math.abs(weaponCol - centerCol) <= 1) ||
                        (weaponRow === stairRow && weaponCol === stairCol)
                    );
                    weaponLocation = {row: weaponRow, col: weaponCol};
                    grid[weaponRow][weaponCol].isWeapon = true;
                    // 不显示武器箱位置到控制台（玩家需通过指引者推理）
                }
                
                // 生成三个指引者地块（v2.0）
                guideLocations = [];
                const occupiedPositions = new Set();
                occupiedPositions.add(`${centerRow},${centerCol}`);
                occupiedPositions.add(`${stairRow},${stairCol}`);
                if (weaponLocation) occupiedPositions.add(`${weaponLocation.row},${weaponLocation.col}`);
                if (treasureLocation) occupiedPositions.add(`${treasureLocation.row},${treasureLocation.col}`);
                
                // 指引者类型分配
                const guideTypes = shuffleArray(['stair', 'weapon', 'reveal']);
                
                for (let i = 0; i < 3; i++) {
                    let guideRow, guideCol;
                    let attempts = 0;
                    do {
                        guideRow = Math.floor(Math.random() * GRID_SIZE);
                        guideCol = Math.floor(Math.random() * GRID_SIZE);
                        attempts++;
                        if (attempts > 100) break;
                    } while (occupiedPositions.has(`${guideRow},${guideCol}`));
                    
                    occupiedPositions.add(`${guideRow},${guideCol}`);
                    guideLocations.push({
                        row: guideRow,
                        col: guideCol,
                        type: guideTypes[i],
                        revealed: false
                    });
                    
                    grid[guideRow][guideCol].isGuide = true;
                    grid[guideRow][guideCol].guideIndex = i;
                }
            }
            
            // 工具：随机打乱数组
            function shuffleArray(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function generateFlowersForCell(row, col, count) {
                const cell = grid[row][col];
                cell.flowers = [];
                const margin = 12;
                const maxAttempts = 80;
                const flowerRadius = 8;

                const colors = [
                    '#f08a9e', '#e85d75', '#f5d76e', '#f9f3e7',
                    '#f7a8b8', '#ff6b8a', '#ffd97a', '#ffe0ec',
                    '#ffb3c6', '#fadf8a', '#fff0f5', '#ffc2d1',
                ];

                for (let i = 0; i < count; i++) {
                    let placed = false;
                    for (let attempt = 0; attempt < maxAttempts; attempt++) {
                        const fx = margin + Math.random() * (cellPixelSize - margin * 2);
                        const fy = margin + Math.random() * (cellPixelSize - margin * 2);
                        // 检查与已有花朵的重叠
                        let overlaps = false;
                        for (const existing of cell.flowers) {
                            const dx = fx - existing.x;
                            const dy = fy - existing.y;
                            if (Math.sqrt(dx * dx + dy * dy) < flowerRadius * 2.5) {
                                overlaps = true;
                                break;
                            }
                        }
                        if (!overlaps) {
                            cell.flowers.push({
                                x: fx,
                                y: fy,
                                color: colors[Math.floor(Math.random() * colors.length)],
                            });
                            placed = true;
                            break;
                        }
                    }
                    if (!placed && cell.flowers.length === 0) {
                        // 如果实在放不下，强制放一个
                        cell.flowers.push({
                            x: cellPixelSize / 2 + (Math.random() - 0.5) * 20,
                            y: cellPixelSize / 2 + (Math.random() - 0.5) * 20,
                            color: colors[Math.floor(Math.random() * colors.length)],
                        });
                    } else if (!placed) {
                        // 微调位置放置
                        const last = cell.flowers[cell.flowers.length - 1];
                        cell.flowers.push({
                            x: last.x + (Math.random() - 0.5) * 25,
                            y: last.y + (Math.random() - 0.5) * 25,
                            color: colors[Math.floor(Math.random() * colors.length)],
                        });
                    }
                }
            }

            function resetGame() {
                currentLayer = 1;
                treasureFragments = 0;
                guideLog = [];
                weaponLevel = 0;
                guerrillaDemandPercent = 0.5;
                initGrid();
                backpack = [];
                treasureFound = false;
                monsterActive = false;
                particles = [];
                hoveredCell = null;
                updateAllUI();
                hintText.textContent = '点击已点亮的地块采集花朵。寻找通往下一层的阶梯和指引者！🧭';
                hintText.className = 'hint-text';
            }

            // ==================== 层数相关计算 ====================
            function getFlowersToLight() {
                // 根据策划案：点亮地块所需花朵数逐步增加（3→4→5→6）
                return FLOWERS_TO_LIGHT_BASE + (currentLayer - 1);
            }
            
            function getNewTileFlowersMin() {
                // 从配置中获取当前层花朵生成范围
                const layerIndex = Math.min(currentLayer - 1, CONFIG.layerFlowerRanges.length - 1);
                return CONFIG.layerFlowerRanges[layerIndex].min;
            }
            
            function getNewTileFlowersMax() {
                // 从配置中获取当前层花朵生成范围
                const layerIndex = Math.min(currentLayer - 1, CONFIG.layerFlowerRanges.length - 1);
                return CONFIG.layerFlowerRanges[layerIndex].max;
            }
            
            function getLayerTheme() {
                // 根据策划案：每层主题不同（浅草、湿地、荆棘、深渊）
                const themes = ['浅草', '湿地', '荆棘', '深渊'];
                return themes[currentLayer - 1] || '浅草';
            }
            
            // ==================== 网格计算 ====================
            function getGridOffset() {
                const totalGridSize = GRID_SIZE * cellPixelSize + (GRID_SIZE - 1) * CELL_GAP;
                const offsetX = (canvasCSSWidth - totalGridSize) / 2;
                const offsetY = (canvasCSSHeight - totalGridSize) / 2;
                return { offsetX, offsetY, totalGridSize };
            }

            function getCellBounds(row, col) {
                const { offsetX, offsetY } = getGridOffset();
                const x = offsetX + col * (cellPixelSize + CELL_GAP);
                const y = offsetY + row * (cellPixelSize + CELL_GAP);
                return { x, y, w: cellPixelSize, h: cellPixelSize };
            }

            function getCellFromPoint(px, py) {
                const { offsetX, offsetY } = getGridOffset();
                for (let row = 0; row < GRID_SIZE; row++) {
                    for (let col = 0; col < GRID_SIZE; col++) {
                        const cx = offsetX + col * (cellPixelSize + CELL_GAP);
                        const cy = offsetY + row * (cellPixelSize + CELL_GAP);
                        if (px >= cx && px <= cx + cellPixelSize && py >= cy && py <= cy + cellPixelSize) {
                            return { row, col };
                        }
                    }
                }
                return null;
            }

            function isAdjacentToLit(row, col) {
                if (grid[row][col].lit) return false;
                const neighbors = [
                    [row - 1, col],
                    [row + 1, col],
                    [row, col - 1],
                    [row, col + 1]
                ];
                for (const [nr, nc] of neighbors) {
                    if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE && grid[nr][nc].lit) {
                        return true;
                    }
                }
                return false;
            }

            function getAdjacentLitCells(row, col) {
                const neighbors = [
                    [row - 1, col],
                    [row + 1, col],
                    [row, col - 1],
                    [row, col + 1]
                ];
                const litNeighbors = [];
                for (const [nr, nc] of neighbors) {
                    if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE && grid[nr][nc].lit) {
                        litNeighbors.push({ row: nr, col: nc });
                    }
                }
                return litNeighbors;
            }

            // ==================== 游戏逻辑 ====================
            // 激活指引者（点亮地块时自动触发，免费获得坐标）
            function activateGuide(row, col) {
                if (monsterActive) return false;
                const cell = grid[row][col];
                if (!cell.lit || !cell.isGuide) return false;
                
                const guideInfo = guideLocations.find(g => g.row === row && g.col === col);
                if (!guideInfo || guideInfo.revealed) return false;
                
                let hintText = '';
                if (currentLayer === TOTAL_LAYERS) {
                    hintText = `我看到一个重要的碎片，在 (${treasureLocation.row}, ${treasureLocation.col}) 处。`;
                } else if (guideInfo.type === 'stair') {
                    hintText = `我看到一个重要的东西，在 (${stairLocation.row}, ${stairLocation.col}) 处。`;
                } else if (guideInfo.type === 'weapon') {
                    const wl = weaponLocation || {row: '?', col: '?'};
                    hintText = `我看到一个重要的东西，在 (${wl.row}, ${wl.col}) 处。`;
                } else if (guideInfo.type === 'reveal') {
                    const others = guideLocations.filter(g => g !== guideInfo && !g.revealed);
                    if (others.length === 0) {
                        hintText = '所有指引者都已解析。';
                    } else {
                        const target = others[Math.floor(Math.random() * others.length)];
                        const targetType = target.type === 'stair' ? '阶梯' : (target.type === 'weapon' ? '武器箱' : '指引者');
                        hintText = `位于 (${target.row},${target.col}) 处的指引者指向的是${targetType}。`;
                    }
                }
                
                guideInfo.revealed = true;
                addGuideLog(`位于 (${row},${col}) 的指引者说：${hintText}`, 'hint');
                showHint(`🧭 指引者：${hintText}`, '');
                updateAllUI();
                return true;
            }
            
            function addGuideLog(message, className = 'normal') {
                const entry = {
                    text: message,
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    class: className
                };
                guideLog.unshift(entry);
                if (guideLog.length > 15) guideLog.pop();
                updateGuideLogUI();
            }
            
            function updateGuideLogUI() {
                if (!guideLogContent) return;
                
                let html = '';
                
                if (guideLog.length > 0) {
                    html += '<div style="margin:0 0 6px;font-size:0.85em;color:#fff;font-weight:600;">📜 指引者记录</div>';
                    for (const entry of guideLog) {
                        html += `<div class="guide-log-entry ${entry.class}">
                            <span style="color:rgba(255,255,255,0.6);font-size:0.8em;">${entry.time}</span><br>
                            ${entry.text}
                        </div>`;
                    }
                } else {
                    html = '<div class="guide-log-empty">点亮指引者地块后自动获得坐标信息</div>';
                }
                
                guideLogContent.innerHTML = html;
                guideLogContent.scrollTop = 0;
            }
            
            function collectFlower(row, col) {
                if (treasureFound || monsterActive) return false;
                const cell = grid[row][col];
                if (!cell.lit) return false;
                if (cell.flowers.length === 0) return false;
                if (backpack.length >= BACKPACK_CAPACITY) {
                    showHint('背包已满！消耗花朵点亮新草皮吧 🔔', 'warning');
                    shakeBackpack();
                    return false;
                }
                // 采集一朵花
                const flower = cell.flowers.pop();
                backpack.push(flower.color);
                // 粒子效果
                const bounds = getCellBounds(row, col);
                const worldX = bounds.x + flower.x;
                const worldY = bounds.y + flower.y;
                spawnParticles(worldX, worldY, flower.color, 6);
                updateAllUI();
                if (cell.flowers.length === 0 && backpack.length < BACKPACK_CAPACITY) {
                    showHint('这块草皮的花采完了~ 看看其他草皮吧', '');
                } else if (backpack.length >= BACKPACK_CAPACITY) {
                    showHint('背包满了！消耗花朵来点亮新草皮吧 🌱', 'warning');
                } else {
                    showHint('继续采集花朵吧~ 🌸', '');
                }
                return true;
            }

            function lightNewTurf(row, col) {
                if (monsterActive) return false;
                if (grid[row][col].lit) return false;
                if (!isAdjacentToLit(row, col)) return false;
                
                const flowersToLight = getFlowersToLight();
                if (backpack.length < flowersToLight) {
                    showHint(`需要 ${flowersToLight} 朵花才能点亮新地块！当前只有 ${backpack.length} 朵`, 'danger');
                    return false;
                }
                // 消耗花朵
                backpack.splice(backpack.length - flowersToLight, flowersToLight);
                
                // 检查是否达到点亮地块上限，如果是则退化最旧的地块
                if (litTilesHistory.length >= MAX_LIT_TILES) {
                    const oldestTile = litTilesHistory[0]; // 最早点亮的地块
                    grid[oldestTile.row][oldestTile.col].lit = false;
                    grid[oldestTile.row][oldestTile.col].litIndex = -1;
                    grid[oldestTile.row][oldestTile.col].flowers = [];
                    litTilesHistory.shift(); // 从历史中移除
                    litCount--;
                    
                    // 重新索引剩余地块
                    for (let i = 0; i < litTilesHistory.length; i++) {
                        const tile = litTilesHistory[i];
                        grid[tile.row][tile.col].litIndex = i;
                    }
                    
                    showHint(`地块上限已达${MAX_LIT_TILES}！最早的点亮地块(${oldestTile.row},${oldestTile.col})已退化 🔄`, 'warning');
                }
                
                // 点亮新地块
                grid[row][col].lit = true;
                grid[row][col].litIndex = litTilesHistory.length;
                litCount++;
                expandedCount++;
                litTilesHistory.push({row, col});
                
                const flowerCount = getNewTileFlowersMin() + Math.floor(Math.random() * (getNewTileFlowersMax() - getNewTileFlowersMin() + 1));
                generateFlowersForCell(row, col, flowerCount);
                
                // 检查是否为阶梯地块
                if (grid[row][col].isStair) {
                    showHint(`🎉 找到了通往下一层的阶梯！守关怪物出现了！ 👾`, '');
                    triggerStairMonster();
                    return true;
                }
                
                // 检查是否为第四层宝藏地块
                if (currentLayer === TOTAL_LAYERS && !treasureFound && row === treasureLocation.row && col === treasureLocation.col) {
                    treasureFound = true;
                    showHint(`🎉 宝藏找到了！你发现了隐藏的宝藏！ 💎`, '');
                    triggerTreasureFound();
                    return true;
                }
                
                // 检查是否为武器箱地块
                if (grid[row][col].isWeapon && weaponLevel === 0) {
                    weaponLevel = 1;
                    const bounds = getCellBounds(row, col);
                    spawnParticles(bounds.x + bounds.w / 2, bounds.y + bounds.h / 2, '#ffd700', 20);
                    showHint(`🗡️ 获得武器 Lv.${weaponLevel}！可在界面上升级。`, 'success');
                }
                
                // 激活指引者（免费自动获得坐标信息）
                if (grid[row][col].isGuide) {
                    activateGuide(row, col);
                }
                
                // 粒子效果
                const bounds = getCellBounds(row, col);
                const cx = bounds.x + bounds.w / 2;
                const cy = bounds.y + bounds.h / 2;
                spawnParticles(cx, cy, '#a0e8a0', 12);
                updateAllUI();
                showHint(`新地块点亮！上面有 ${flowerCount} 朵花~ 🌼`, '');
                
                // 替代胜利：游击模式下点亮所有非枯萎地块即完成本层
                if (inGuerrillaMode) {
                    let allNonWitheredLit = true;
                    for (let r = 0; r < GRID_SIZE; r++) {
                        for (let c = 0; c < GRID_SIZE; c++) {
                            if (!grid[r][c].withered && !grid[r][c].lit) {
                                allNonWitheredLit = false;
                                break;
                            }
                        }
                        if (!allNonWitheredLit) break;
                    }
                    if (allNonWitheredLit) {
                        showHint('🌿 全图点亮！强迫怪物退让，进入下一层！', 'success');
                        inGuerrillaMode = false;
                        guerrillaTriggerCount = 0;
                        advanceToNextLayer();
                        return true;
                    }
                }
                
                // 检查游击怪物触发（如果处于游击模式）
                if (inGuerrillaMode) {
                    guerrillaTriggerCount++;
                    if (guerrillaTriggerCount >= MONSTER_INTERVAL) {
                        guerrillaTriggerCount = 0;
                        triggerGuerrillaMonster();
                        return true;
                    }
                }
                
                return true;
            }

            function getGuardDemandPercent() {
                // 有武器且非游击模式时，受武器等级影响；游击模式使用guerrillaDemandPercent
                if (inGuerrillaMode) return guerrillaDemandPercent;
                return weaponLevel > 0 ? WEAPON_DEMAND_PERCENTS[weaponLevel] : MONSTER_DEMAND_PERCENT;
            }
            
            function showMonsterOverlay(percent, demand, isGuerrilla) {
                monsterActive = true;
                const type = isGuerrilla ? '游击怪物' : '守关怪物';
                monsterStolenInfo.textContent = `${type}索要你背包中 ${backpack.length} 朵花的 ${Math.round(percent * 100)}% 作为通行代价（${demand} 朵花）。`;
                
                // 显示攻击按钮的条件：非游击模式且持有武器
                if (!inGuerrillaMode && weaponLevel > 0) {
                    document.querySelector('.btn-monster-attack').style.display = 'inline-block';
                } else {
                    document.querySelector('.btn-monster-attack').style.display = 'none';
                }
                
                updateAllUI();
                gameWrapper.classList.add('shaking');
                setTimeout(() => gameWrapper.classList.remove('shaking'), 600);
                monsterOverlay.style.display = 'flex';
            }
            
            function triggerStairMonster() {
                const demand = Math.ceil(backpack.length * getGuardDemandPercent());
                const percent = getGuardDemandPercent();
                showMonsterOverlay(percent, demand, false);
            }
            
            function triggerGuerrillaMonster() {
                const demand = Math.ceil(backpack.length * guerrillaDemandPercent);
                showMonsterOverlay(guerrillaDemandPercent, demand, true);
            }
            
            function destroyRandomTile() {
                if (litTilesHistory.length === 0) return false;
                let destroyIndex = Math.floor(Math.random() * litTilesHistory.length);
                if (destroyIndex === 0 && litTilesHistory.length > 1) {
                    destroyIndex = 1 + Math.floor(Math.random() * (litTilesHistory.length - 1));
                }
                const tileToDestroy = litTilesHistory[destroyIndex];
                const destroyedTile = grid[tileToDestroy.row][tileToDestroy.col];
                destroyedTile.lit = false;
                destroyedTile.litIndex = -1;
                destroyedTile.flowers = [];
                destroyedTile.withered = true;
                litTilesHistory.splice(destroyIndex, 1);
                for (let i = destroyIndex; i < litTilesHistory.length; i++) {
                    const tile = litTilesHistory[i];
                    grid[tile.row][tile.col].litIndex = i;
                }
                litCount--;
                showHint(`怪物摧毁了一个地块！剩余点亮地块：${litTilesHistory.length}/${MAX_LIT_TILES}`, 'danger');
                return true;
            }
            
            function payMonster() {
                const demand = Math.ceil(backpack.length * getGuardDemandPercent());
                
                if (backpack.length === 0) {
                    showHint(`背包里没有花，无法支付！`, 'danger');
                    destroyRandomTile();
                    if (!inGuerrillaMode) {
                        inGuerrillaMode = true;
                        guerrillaTriggerCount = 0;
                        showHint(`进入游击模式，每点亮${MONSTER_INTERVAL}块地会再次遇到怪物！`, 'warning');
                    }
                    monsterOverlay.style.display = 'none';
                    monsterActive = false;
                    updateAllUI();
                    return;
                }
                
                if (backpack.length >= demand) {
                    backpack.splice(backpack.length - demand, demand);
                    showHint(`支付了 ${demand} 朵花，怪物满意地离开了！进入下一层！💰`, inGuerrillaMode ? 'success' : 'warning');
                    inGuerrillaMode = false;
                    guerrillaTriggerCount = 0;
                    advanceToNextLayer();
                } else {
                    showHint(`花朵不足，无法支付！`, 'danger');
                }
                
                monsterOverlay.style.display = 'none';
                monsterActive = false;
                updateAllUI();
            }
            
            function refuseMonster() {
                const destroyed = destroyRandomTile();
                if (!destroyed) {
                    showHint('幸运的是没有地块可摧毁！', 'warning');
                }
                if (!inGuerrillaMode) {
                    inGuerrillaMode = true;
                    guerrillaTriggerCount = 0;
                    showHint(`你拒绝了怪物！进入游击模式，每点亮${MONSTER_INTERVAL}块地会再次遇到怪物！`, 'warning');
                }
                monsterOverlay.style.display = 'none';
                monsterActive = false;
                updateAllUI();
            }
            
            // 攻击怪物（仅守关、有武器时可用）
            function attackMonster() {
                if (inGuerrillaMode || weaponLevel === 0) return;
                // 攻击效果：摧毁2块随机已点亮地块（优先有花的），进入游击模式
                showHint('⚔️ 你攻击了怪物！怪物摧毁了2块地块并进入了游击模式！', 'danger');
                destroyRandomTile();
                destroyRandomTile();
                inGuerrillaMode = true;
                guerrillaTriggerCount = 0;
                guerrillaDemandPercent = 0.3; // 攻击后游击怪物索要30%
                monsterOverlay.style.display = 'none';
                monsterActive = false;
                updateAllUI();
            }
            window.attackMonster = attackMonster;
            
            // 武器升级
            function upgradeWeapon() {
                if (weaponLevel <= 0 || weaponLevel >= 4) {
                    showHint('武器已满级或未获得武器！', 'warning');
                    return;
                }
                const cost = WEAPON_UPGRADE_COSTS[weaponLevel]; // 升级到下一级的花费
                if (backpack.length < cost) {
                    showHint(`升级到 Lv.${weaponLevel + 1} 需要 ${cost} 朵花，当前只有 ${backpack.length} 朵`, 'warning');
                    return;
                }
                backpack.splice(backpack.length - cost, cost);
                weaponLevel++;
                showHint(`🗡️ 武器升级到 Lv.${weaponLevel}！怪物的要求将降低至 ${Math.round(WEAPON_DEMAND_PERCENTS[weaponLevel] * 100)}%。`, 'success');
                updateAllUI();
            }
            window.upgradeWeapon = upgradeWeapon;
            
            function restoreWitheredTile(row, col) {
                const cell = grid[row][col];
                if (!cell.withered) return false;
                
                const flowersToLight = getFlowersToLight();
                if (backpack.length < flowersToLight) return false;
                
                // 消耗花朵
                backpack.splice(backpack.length - flowersToLight, flowersToLight);
                
                // 恢复地块
                cell.withered = false;
                cell.lit = true;
                cell.litIndex = litTilesHistory.length;
                litCount++;
                litTilesHistory.push({row, col});
                
                // 生成花朵
                const flowerCount = getNewTileFlowersMin() + Math.floor(Math.random() * (getNewTileFlowersMax() - getNewTileFlowersMin() + 1));
                generateFlowersForCell(row, col, flowerCount);
                
                // 粒子效果
                const bounds = getCellBounds(row, col);
                const cx = bounds.x + bounds.w / 2;
                const cy = bounds.y + bounds.h / 2;
                spawnParticles(cx, cy, '#a0e8a0', 12);
                updateAllUI();
                showHint(`枯萎地块恢复！上面有 ${flowerCount} 朵花~ 🌼`, '');
                
                return true;
            }
            
            function advanceToNextLayer() {
                if (currentLayer < TOTAL_LAYERS) {
                    // 获得宝藏碎片（前三层）
                    if (currentLayer < TOTAL_LAYERS) { // 第1~3层获得碎片（进入下一层时）
                        treasureFragments++;
                        showHint(`🎊 进入第${currentLayer + 1}层！获得宝藏碎片 ${treasureFragments}/3`, '');
                    } else {
                        showHint(`🎊 进入第${currentLayer + 1}层！这是最后一层，寻找"大地之心"！`, '');
                    }
                    
                    currentLayer++;
                    guideLog = []; // 清除旧层的指引者提示
                    initGrid();
                    updateAllUI();
                    showHint(`进入第${currentLayer}层：${getLayerTheme()}，点亮需要${getFlowersToLight()}朵花`, '');
                } else {
                    // 第四层完成，游戏胜利
                    triggerTreasureFound();
                }
            }

            function triggerTreasureFound() {
                treasureFound = true;
                updateAllUI();
                // 更新弹窗内容为宝藏主题
                document.getElementById('winEmoji').textContent = '💎';
                document.getElementById('winTitle').textContent = '大地之心找到了！';
                document.getElementById('winMessage').innerHTML = `你成功穿越了<span style="color:#f0c060">${TOTAL_LAYERS}层深渊</span>，集齐了所有宝藏碎片！<br>最终在深渊底层发现了传说中的"大地之心" 💎✨`;
                document.getElementById('winSubtitle').textContent = '真正的冒险者懂得在限制中寻找机会！';
                
                setTimeout(() => {
                    winOverlay.style.display = 'flex';
                    spawnParticles(canvas.width / 2, canvas.height / 2, '#ffd700', 30);
                }, 400);
                showHint('🎉 大地之心找到了！游戏胜利！', '');
            }

            function shakeBackpack() {
                const slotsContainer = document.getElementById('backpackSlots');
                slotsContainer.style.animation = 'none';
                slotsContainer.offsetHeight;
                slotsContainer.style.animation = 'shake 0.4s ease-out';
                setTimeout(() => {
                    slotsContainer.style.animation = '';
                }, 400);
            }

            function showHint(msg, className) {
                hintText.textContent = msg;
                hintText.className = 'hint-text ' + (className || '');
            }

            // ==================== 粒子系统 ====================
            function spawnParticles(x, y, color, count) {
                for (let i = 0; i < count; i++) {
                    particles.push({
                        x,
                        y,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6 - 3,
                        life: 1,
                        decay: 0.02 + Math.random() * 0.04,
                        color,
                        size: 2 + Math.random() * 4,
                    });
                }
            }

            function updateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1;
                    p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }

            function drawParticles(ctx) {
                for (const p of particles) {
                    ctx.save();
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    // 光晕
                    ctx.fillStyle = 'rgba(255,255,255,' + (p.life * 0.5) + ')';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // ==================== 绘制 ====================
            function drawCell(ctx, row, col, bounds) {
                const { x, y, w, h } = bounds;
                const cell = grid[row][col];
                const radius = 12;
                const isHovered = hoveredCell && hoveredCell.row === row && hoveredCell.col === col;

                ctx.save();

                if (cell.withered) {
                    // 枯萎地块
                    ctx.fillStyle = '#2a2520';
                    ctx.beginPath();
                    ctx.roundRect(x, y, w, h, radius);
                    ctx.fill();
                    
                    ctx.strokeStyle = '#8a5a5a';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 3]);
                    ctx.beginPath();
                    ctx.roundRect(x, y, w, h, radius);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    // 枯萎标记
                    ctx.fillStyle = 'rgba(200,100,100,0.7)';
                    ctx.font = 'bold 14px "Segoe UI","PingFang SC",sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('💀', x + w / 2, y + h / 2 + 5);
                    
                    // 可恢复提示
                    ctx.fillStyle = 'rgba(255,255,255,0.35)';
                    ctx.font = '10px "Segoe UI","PingFang SC",sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(`${getFlowersToLight()}🌸恢复`, x + w / 2, y + h - 6);
                } else if (cell.lit) {
                    // 已点亮的草皮 - 绿色
                    const grad = ctx.createLinearGradient(x, y, x, y + h);
                    grad.addColorStop(0, '#7ec85c');
                    grad.addColorStop(0.5, '#6ab84a');
                    grad.addColorStop(1, '#5a9a3d');
                    ctx.fillStyle = grad;
                    ctx.beginPath();
                    ctx.roundRect(x, y, w, h, radius);
                    ctx.fill();

                    // 草皮纹理
                    ctx.fillStyle = 'rgba(90,140,60,0.25)';
                    for (let i = 0; i < 6; i++) {
                        const tx = x + Math.random() * w;
                        const ty = y + Math.random() * h;
                        ctx.beginPath();
                        ctx.arc(tx, ty, 3 + Math.random() * 6, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    // 边框
                    ctx.strokeStyle = '#4a8a35';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.roundRect(x, y, w, h, radius);
                    ctx.stroke();

                    // 内边框装饰
                    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.roundRect(x + 3, y + 3, w - 6, h - 6, radius - 2);
                    ctx.stroke();

                    // 悬停高亮
                    if (isHovered && cell.flowers.length > 0 && backpack.length < BACKPACK_CAPACITY) {
                        ctx.fillStyle = 'rgba(255,255,255,0.12)';
                        ctx.beginPath();
                        ctx.roundRect(x, y, w, h, radius);
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(255,255,200,0.6)';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.roundRect(x, y, w, h, radius);
                        ctx.stroke();
                    }

                    // 绘制花朵
                    for (const flower of cell.flowers) {
                        drawFlower(ctx, x + flower.x, y + flower.y, flower.color);
                    }

                    // 花朵数量指示（如果花较多）
                    if (cell.flowers.length >= 4) {
                        ctx.fillStyle = 'rgba(0,0,0,0.5)';
                        ctx.font = 'bold 11px "Segoe UI","PingFang SC",sans-serif';
                        ctx.textAlign = 'right';
                        ctx.fillText('×' + cell.flowers.length, x + w - 8, y + 16);
                    }
                    
                    // 阶梯地块标记
                    if (cell.isStair) {
                        ctx.fillStyle = 'rgba(255,220,100,0.9)';
                        ctx.font = 'bold 16px "Segoe UI","PingFang SC",sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText('🪜', x + w / 2, y + 22);
                    }
                    
                    // 指引者地块标记（已点亮，免费提供坐标）
                    if (cell.isGuide) {
                        const guideInfo = guideLocations.find(g => g.row === row && g.col === col);
                        const isUsed = guideInfo && guideInfo.revealed;
                        ctx.globalAlpha = isUsed ? 0.5 : 1.0;
                        ctx.fillStyle = isUsed ? 'rgba(160,220,255,0.5)' : 'rgba(160,220,255,0.9)';
                        ctx.font = 'bold 14px "Segoe UI","PingFang SC",sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText(isUsed ? '✅' : '🧭', x + w / 2, y + 22);
                        ctx.globalAlpha = 1.0;
                    }
                    
                    // 武器箱地块标记（已点亮）
                    if (cell.isWeapon) {
                        const hasWeapon = weaponLevel > 0;
                        ctx.fillStyle = hasWeapon ? 'rgba(255,215,0,0.6)' : 'rgba(255,215,0,0.9)';
                        ctx.font = 'bold 16px "Segoe UI","PingFang SC",sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText(hasWeapon ? '✅' : '🗡️', x + w / 2, y + 22);
                    }
                } else {
                    // 未点亮的草皮
                    const isExpandable = isAdjacentToLit(row, col);
                    if (isExpandable) {
                        // 可扩展的暗草皮
                        const grad = ctx.createLinearGradient(x, y, x, y + h);
                        grad.addColorStop(0, '#5a5040');
                        grad.addColorStop(1, '#3d3528');
                        ctx.fillStyle = grad;
                    } else {
                        // 完全未解锁
                        ctx.fillStyle = '#2a2520';
                    }
                    ctx.beginPath();
                    ctx.roundRect(x, y, w, h, radius);
                    ctx.fill();

                    ctx.strokeStyle = isExpandable ? '#8a7a5a' : '#444';
                    ctx.lineWidth = isExpandable ? 2 : 1.5;
                    ctx.setLineDash(isExpandable ? [6, 3] : []);
                    ctx.beginPath();
                    ctx.roundRect(x, y, w, h, radius);
                    ctx.stroke();
                    ctx.setLineDash([]);

                    // 可扩展提示
                    if (isExpandable) {
                        const pulse = 0.4 + 0.3 * Math.sin(Date.now() / 800);
                        ctx.fillStyle = `rgba(180,220,160,${pulse})`;
                        ctx.beginPath();
                        ctx.roundRect(x, y, w, h, radius);
                        ctx.fill();
                        // 小图标提示
                        ctx.fillStyle = 'rgba(255,255,255,0.7)';
                        ctx.font = '18px "Segoe UI","PingFang SC",sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText('🔓', x + w / 2, y + h / 2 + 6);

                        // 悬停高亮
                        if (isHovered && backpack.length >= getFlowersToLight()) {
                            ctx.fillStyle = 'rgba(255,255,200,0.2)';
                            ctx.beginPath();
                            ctx.roundRect(x, y, w, h, radius);
                            ctx.fill();
                            ctx.strokeStyle = 'rgba(255,220,150,0.8)';
                            ctx.lineWidth = 3;
                            ctx.setLineDash([]);
                            ctx.beginPath();
                            ctx.roundRect(x, y, w, h, radius);
                            ctx.stroke();
                        }
                    }

                    // 坐标标记（小）
                    if (isExpandable) {
                        ctx.fillStyle = 'rgba(255,255,255,0.35)';
                        ctx.font = '10px "Segoe UI","PingFang SC",sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText(`${getFlowersToLight()}🌸`, x + w / 2, y + h - 6);
                    }
                    
                    // 未点亮指引者地块标记
                    if (cell.isGuide) {
                        ctx.fillStyle = 'rgba(160,220,255,0.6)';
                        ctx.font = 'bold 14px "Segoe UI","PingFang SC",sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText('❓', x + w / 2, y + 18);
                    }
                    
                    // 未点亮武器箱地块标记
                    if (cell.isWeapon) {
                        ctx.fillStyle = 'rgba(255,215,0,0.5)';
                        ctx.font = 'bold 14px "Segoe UI","PingFang SC",sans-serif';
                        ctx.textAlign = 'center';
                        ctx.fillText(' ', x + w / 2, y + 18);
                    }
                }

                ctx.restore();
            }

            function drawFlower(ctx, fx, fy, color) {
                ctx.save();
                // 花瓣
                const petalCount = 5;
                const petalRadius = 5;
                const centerRadius = 3.5;
                for (let i = 0; i < petalCount; i++) {
                    const angle = (i / petalCount) * Math.PI * 2 - Math.PI / 2;
                    const px = fx + Math.cos(angle) * (petalRadius * 0.85);
                    const py = fy + Math.sin(angle) * (petalRadius * 0.85);
                    ctx.fillStyle = color;
                    ctx.beginPath();
                    ctx.arc(px, py, petalRadius * 0.7, 0, Math.PI * 2);
                    ctx.fill();
                    // 花瓣高光
                    ctx.fillStyle = 'rgba(255,255,255,0.35)';
                    ctx.beginPath();
                    ctx.arc(px - 0.8, py - 0.8, petalRadius * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                }
                // 花蕊
                const centerGrad = ctx.createRadialGradient(fx, fy, 0, fx, fy, centerRadius);
                centerGrad.addColorStop(0, '#fffde0');
                centerGrad.addColorStop(0.5, '#f9d76e');
                centerGrad.addColorStop(1, '#e8a830');
                ctx.fillStyle = centerGrad;
                ctx.beginPath();
                ctx.arc(fx, fy, centerRadius, 0, Math.PI * 2);
                ctx.fill();
                // 花蕊高光
                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.beginPath();
                ctx.arc(fx - 0.8, fy - 1, 1.2, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            function drawGame(ctx) {
                // 确保Canvas尺寸已设置
                if (canvasCSSWidth === 0 || canvasCSSHeight === 0) {
                    console.warn('Canvas尺寸未设置，跳过绘制');
                    return;
                }
                
                // 背景
                const bgGrad = ctx.createRadialGradient(canvasCSSWidth / 2, canvasCSSHeight / 2, 0,
                    canvasCSSWidth / 2, canvasCSSHeight / 2, canvasCSSWidth * 0.7);
                bgGrad.addColorStop(0, '#2a2a20');
                bgGrad.addColorStop(1, '#151510');
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, canvasCSSWidth, canvasCSSHeight);

                // 装饰性背景点
                ctx.fillStyle = 'rgba(255,255,255,0.015)';
                for (let i = 0; i < 30; i++) {
                    const seed = i * 137.5;
                    const dx = (Math.sin(seed) * 0.6 + 0.5) * canvasCSSWidth;
                    const dy = (Math.cos(seed * 1.7) * 0.6 + 0.5) * canvasCSSHeight;
                    ctx.beginPath();
                    ctx.arc(dx, dy, 8 + Math.sin(seed) * 4, 0, Math.PI * 2);
                    ctx.fill();
                }

                // 绘制所有草皮
                for (let row = 0; row < GRID_SIZE; row++) {
                    for (let col = 0; col < GRID_SIZE; col++) {
                        const bounds = getCellBounds(row, col);
                        drawCell(ctx, row, col, bounds);
                    }
                }

                // 绘制粒子
                drawParticles(ctx);

                // 网格中心装饰
                const centerBounds = getCellBounds(Math.floor(GRID_SIZE / 2), Math.floor(GRID_SIZE / 2));
                if (grid[Math.floor(GRID_SIZE / 2)][Math.floor(GRID_SIZE / 2)].lit && litCount === 1) {
                    // 初始草皮特殊标记
                    const cx = centerBounds.x + centerBounds.w / 2;
                    const cy = centerBounds.y - 10;
                    ctx.fillStyle = 'rgba(255,255,200,0.7)';
                    ctx.font = 'bold 11px "Segoe UI","PingFang SC",sans-serif';
                    ctx.textAlign = 'center';
                    const bounce = Math.sin(Date.now() / 1200) * 3;
                    ctx.fillText('🏡 起点', cx, cy + bounce);
                }
            }

            // ==================== UI更新 ====================
            function updateAllUI() {
                updateProgressUI();
                updateBackpackUI();
                updateGuideLogUI();
                updateWeaponUI();
            }
            
            function updateWeaponUI() {
                if (weaponLevel > 0) {
                    weaponPanel.style.display = 'flex';
                    weaponLevelText.textContent = weaponLevel;
                    const nextLevelCost = weaponLevel < 4 ? WEAPON_UPGRADE_COSTS[weaponLevel] : 0;
                    if (weaponLevel >= 4) {
                        btnWeaponUpgrade.textContent = '已满级';
                        btnWeaponUpgrade.disabled = true;
                    } else {
                        btnWeaponUpgrade.textContent = `⬆ 升级 (${nextLevelCost}🌸)`;
                        btnWeaponUpgrade.disabled = backpack.length < nextLevelCost;
                    }
                } else {
                    weaponPanel.style.display = 'none';
                }
            }

            

            function updateProgressUI() {
                // 更新层数显示
                document.getElementById('currentLayer').textContent = currentLayer;
                document.getElementById('totalLayers').textContent = TOTAL_LAYERS;
                
                // 显示当前点亮地块数/上限 和 碎片信息
                progressNumber.textContent = `当前: ${litTilesHistory.length}/${MAX_LIT_TILES} | 碎片: ${treasureFragments}/3`;
                
                // 更新进度点（显示层数进度）
                progressDots.innerHTML = '';
                for (let i = 0; i < TOTAL_LAYERS; i++) {
                    const dot = document.createElement('span');
                    dot.className = 'progress-dot';
                    if (i < currentLayer - 1) {
                        dot.classList.add('lit');
                        dot.textContent = '✓';
                    } else if (i === currentLayer - 1) {
                        dot.classList.add('current');
                        dot.textContent = currentLayer;
                    }
                    progressDots.appendChild(dot);
                }
                
                // 提示区域显示基本操作提示
                if (!(currentLayer === TOTAL_LAYERS && treasureFound)) {
                    hintText.textContent = '点击已点亮地块采集花朵 🌸';
                }
            }

            function updateBackpackUI() {
                backpackSlots.innerHTML = '';
                for (let i = 0; i < BACKPACK_CAPACITY; i++) {
                    const slot = document.createElement('span');
                    slot.className = 'backpack-slot';
                    if (i < backpack.length) {
                        slot.classList.add('filled');
                        const flowerEmoji = document.createElement('span');
                        flowerEmoji.className = 'flower-emoji';
                        flowerEmoji.textContent = '🌸';
                        slot.appendChild(flowerEmoji);
                    }
                    backpackSlots.appendChild(slot);
                }
                backpackCount.textContent = `${backpack.length}/${BACKPACK_CAPACITY}`;
                if (backpack.length >= BACKPACK_CAPACITY) {
                    backpackCount.style.color = '#e05555';
                } else if (backpack.length >= getFlowersToLight()) {
                    backpackCount.style.color = '#f0c060';
                } else {
                    backpackCount.style.color = '#aaa';
                }
            }

            // ==================== Canvas尺寸管理 ====================
            function resizeCanvas() {
                // 使用gameWrapper作为容器，确保它有正确的宽度
                const containerWidth = gameWrapper.clientWidth;
                const maxSize = Math.min(containerWidth, 460);
                const dpr = Math.min(window.devicePixelRatio || 1, 2);
                const cssSize = maxSize;
                canvas.style.width = cssSize + 'px';
                canvas.style.height = cssSize + 'px';
                canvas.width = cssSize * dpr;
                canvas.height = cssSize * dpr;
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.scale(dpr, dpr);
                // 存储CSS尺寸用于网格计算
                canvasCSSWidth = cssSize;
                canvasCSSHeight = cssSize;
                // 重新计算单元格大小
                const availableSpace = cssSize - CANVAS_PADDING * 2;
                cellPixelSize = Math.floor((availableSpace - (GRID_SIZE - 1) * CELL_GAP) / GRID_SIZE);
                // 确保不小于40
                if (cellPixelSize < 40) cellPixelSize = 40;
            }

            // ==================== 事件处理 ====================
            function getCanvasEventPos(e) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvasCSSWidth / rect.width;
                const scaleY = canvasCSSHeight / rect.height;
                return {
                    x: (e.clientX - rect.left) * scaleX,
                    y: (e.clientY - rect.top) * scaleY,
                };
            }

            canvas.addEventListener('click', function(e) {
                if (monsterActive) return;
                const pos = getCanvasEventPos(e);
                const cell = getCellFromPoint(pos.x, pos.y);
                if (!cell) return;
                const { row, col } = cell;
                const gridCell = grid[row][col];

                if (gridCell.withered) {
                    // 枯萎地块 - 尝试恢复
                    const flowersToLight = getFlowersToLight();
                    if (backpack.length >= flowersToLight) {
                        restoreWitheredTile(row, col);
                    } else {
                        showHint(`需要 ${flowersToLight} 朵花恢复枯萎地块，当前 ${backpack.length} 朵`, 'danger');
                        shakeBackpack();
                    }
                } else if (gridCell.lit) {
                    // 已点亮 - 采集花朵
                    if (gridCell.flowers.length > 0) {
                        collectFlower(row, col);
                    } else if (isAdjacentToLit(row, col) === false && gridCell.lit) {
                        // 这块地块花采完了
                        showHint('这块地块没有花了~ 扩展新地块吧 🌱', '');
                    }
                } else if (isAdjacentToLit(row, col)) {
                    // 可扩展 - 尝试点亮
                    const flowersToLight = getFlowersToLight();
                    if (backpack.length >= flowersToLight) {
                        lightNewTurf(row, col);
                    } else {
                        showHint(`需要 ${flowersToLight} 朵花点亮地块，当前 ${backpack.length} 朵`, 'danger');
                        shakeBackpack();
                    }
                } else {
                    showHint('需要先扩展到相邻的地块哦~', '');
                }
            });

            canvas.addEventListener('mousemove', function(e) {
                const pos = getCanvasEventPos(e);
                hoveredCell = getCellFromPoint(pos.x, pos.y);
            });

            canvas.addEventListener('mouseleave', function() {
                hoveredCell = null;
            });

            // 触摸事件（移动端）
            canvas.addEventListener('touchstart', function(e) {
                if (e.touches.length === 1) {
                    const pos = getCanvasEventPos(e.touches[0]);
                    hoveredCell = getCellFromPoint(pos.x, pos.y);
                }
            }, { passive: true });

            canvas.addEventListener('touchend', function(e) {
                hoveredCell = null;
            });

            // 弹窗按钮
            btnMonsterPay.addEventListener('click', function() {
                payMonster();
            });
            
            btnMonsterRefuse.addEventListener('click', function() {
                refuseMonster();
            });
            
            btnMonsterAttack.addEventListener('click', function() {
                attackMonster();
            });
            
            btnWeaponUpgrade.addEventListener('click', function() {
                upgradeWeapon();
            });

            btnWinOk.addEventListener('click', function() {
                winOverlay.style.display = 'none';
                resetGame();
                resizeCanvas();
            });

            // 键盘快捷键
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && monsterActive) {
                    monsterOverlay.style.display = 'none';
                    monsterActive = false;
                    updateAllUI();
                }
                if (e.key === 'r' && winOverlay.style.display === 'flex') {
                    winOverlay.style.display = 'none';
                    resetGame();
                    resizeCanvas();
                }
            });

            // ==================== 游戏循环 ====================
            function gameLoop() {
                updateParticles();
                drawGame(ctx);
                
                // 花朵再生：当地图上所有已点亮地块都无花可采时，初始地块缓慢再生
                regrowCooldown++;
                if (regrowCooldown >= 120) { // 约2秒（60fps）
                    regrowCooldown = 0;
                    const centerRow = Math.floor(GRID_SIZE / 2);
                    const centerCol = Math.floor(GRID_SIZE / 2);
                    const centerCell = grid[centerRow] && grid[centerCol] ? grid[centerRow][centerCol] : null;
                    
                    if (centerCell && centerCell.lit && !centerCell.withered) {
                        // 检查所有已点亮地块是否都无花
                        let allEmpty = true;
                        for (let r = 0; r < GRID_SIZE; r++) {
                            for (let c = 0; c < GRID_SIZE; c++) {
                                if (grid[r][c].lit && grid[r][c].flowers.length > 0) {
                                    allEmpty = false;
                                    break;
                                }
                            }
                            if (!allEmpty) break;
                        }
                        
                        // 全部为空且背包未满且初始地块花少（少于初始量的一半）时再生
                        if (allEmpty && backpack.length < BACKPACK_CAPACITY && centerCell.flowers.length <= 1) {
                            const flowerColors = ['#f08a9e', '#e85d75', '#f5d76e', '#f9f3e7'];
                            const newFlower = {
                                x: 12 + Math.random() * (cellPixelSize - 24),
                                y: 12 + Math.random() * (cellPixelSize - 24),
                                color: flowerColors[Math.floor(Math.random() * flowerColors.length)]
                            };
                            centerCell.flowers.push(newFlower);
                        }
                    }
                }
                
                // 更新悬停光标
                if (hoveredCell) {
                    const cell = grid[hoveredCell.row][hoveredCell.col];
                    if (cell.lit && cell.flowers.length > 0 && backpack.length < BACKPACK_CAPACITY) {
                        canvas.style.cursor = 'pointer';
                    } else if (!cell.lit && isAdjacentToLit(hoveredCell.row, hoveredCell.col) && backpack.length >=
                        getFlowersToLight()) {
                        canvas.style.cursor = 'pointer';
                    } else if (!cell.lit && isAdjacentToLit(hoveredCell.row, hoveredCell.col)) {
                        canvas.style.cursor = 'help';
                    } else {
                        canvas.style.cursor = 'default';
                    }
                } else {
                    canvas.style.cursor = 'default';
                }
                requestAnimationFrame(gameLoop);
            }

            // ==================== 启动 ====================
            function init() {
                resizeCanvas();
                resetGame();
                updateAllUI();
                progressDots.innerHTML = '';
                for (let i = 0; i < TOTAL_LAYERS; i++) {
                    const dot = document.createElement('span');
                    dot.className = 'progress-dot';
                    if (i === 0) dot.classList.add('current');
                    dot.textContent = i + 1;
                    progressDots.appendChild(dot);
                }
                gameLoop();
            }

            window.addEventListener('resize', () => {
                resizeCanvas();
            });

            // polyfill roundRect
            if (!ctx.roundRect) {
                ctx.roundRect = function(x, y, w, h, r) {
                    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
                    ctx.beginPath();
                    ctx.moveTo(x + r.tl, y);
                    ctx.lineTo(x + w - r.tr, y);
                    ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
                    ctx.lineTo(x + w, y + h - r.br);
                    ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
                    ctx.lineTo(x + r.bl, y + h);
                    ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
                    ctx.lineTo(x, y + r.tl);
                    ctx.quadraticCurveTo(x, y, x + r.tl, y);
                    ctx.closePath();
                };
            }

            init();
            console.log('🌿 层渊花园游戏已就绪！');
            console.log('  - 点击绿色地块采集花朵');
            console.log('  - 消耗' + getFlowersToLight() + '朵花点亮相邻暗地块（虚线边框）');
            console.log('  - 找到阶梯地块会触发守关怪物，可选择支付或拒绝');
            console.log('  - 拒绝支付会进入游击模式，每点亮' + MONSTER_INTERVAL + '块地遇到怪物');
            console.log('  - 目标：穿越' + TOTAL_LAYERS + '层深渊，找到"大地之心"');
            console.log('  - 背包容量：' + BACKPACK_CAPACITY + '朵花');
            console.log('💡 提示：寻找遍布地图的三个指引者，支付花朵获取关于阶梯/宝藏的提示！');
        })();
    </script>
